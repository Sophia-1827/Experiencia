<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Gas Mapocho</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-brand .login-logo {
            height: 52px;
            width: auto;
            margin-bottom: 0.9rem;
        }
        .login-brand p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-brand">
        <img th:src="@{/img/gasco.png}" alt="Gasco" class="login-logo">
        <p>Sistema de gestión de inventario</p>
    </div>

    <div class="card">
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
                Email o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email"
                           id="username"
                           name="username"
                           class="form-control"
                           placeholder="correo@mapocho.com"
                           required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="••••••••"
                           required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Ingresar
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
