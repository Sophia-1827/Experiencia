<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Inventario de Cilindros</title></head>
<body>
<section>
    <div class="mb-4">
        <h4 class="fw-bold mb-1">Inventario de Cilindros</h4>
        <p class="text-muted mb-0">Estado actual del stock por tipo</p>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card lleno p-3">
                <div class="text-muted small">Llenos</div>
                <div class="fs-2 fw-bold text-success" th:text="${totalLlenos}">0</div>
                <div class="text-muted small">Total en stock</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card vacio p-3">
                <div class="text-muted small">Vacios</div>
                <div class="fs-2 fw-bold text-danger" th:text="${totalVacios}">0</div>
                <div class="text-muted small">Pendientes recarga</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card vendido p-3">
                <div class="text-muted small">Vendidos</div>
                <div class="fs-2 fw-bold text-primary" th:text="${totalVendidos}">0</div>
                <div class="text-muted small">Este periodo</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card viejo p-3">
                <div class="text-muted small">Viejos</div>
                <div class="fs-2 fw-bold text-secondary" th:text="${totalViejos}">0</div>
                <div class="text-muted small">Para dar de baja</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th class="text-center">Cantidad</th>
                    <th class="text-center"
                        sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN')">
                        Acciones
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cilindros}">
                    <td>
                            <span class="badge bg-secondary"
                                  th:text="${c.tipo.name().replace('KG_','') + ' kg'}">
                            </span>
                    </td>
                    <td>
                            <span th:text="${c.estado}"
                                  th:class="${c.estado.name() == 'LLENO'} ? 'badge bg-success' :
                                            (${c.estado.name() == 'VACIO'} ? 'badge bg-danger' :
                                            (${c.estado.name() == 'VENDIDO'} ? 'badge bg-primary' :
                                            'badge bg-secondary'))">
                            </span>
                    </td>
                    <td class="text-center fw-semibold" th:text="${c.cantidad}"></td>
                    <td class="text-center"
                        sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN')">
                        <form th:if="${c.estado.name() != 'VIEJO'}"
                              th:action="@{/cilindros/marcarViejo/{id}(id=${c.idCilindro})}"
                              method="post"
                              style="display:inline">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">
                            <button type="submit"
                                    class="btn btn-sm btn-outline-secondary"
                                    onclick="return confirm('¿Marcar como viejo?')">
                                Marcar viejo
                            </button>
                        </form>
                        <span th:if="${c.estado.name() == 'VIEJO'}"
                              class="text-muted small">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
