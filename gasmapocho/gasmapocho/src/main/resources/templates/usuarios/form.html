<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Formulario Usuario</title></head>
<body>
<section>
    <div class="mb-4">
        <h4 class="fw-bold mb-1"
            th:text="${usuario.idUsuario != null} ? 'Editar Usuario' : 'Nuevo Usuario'">
        </h4>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:object="${usuario}"
                  th:action="${usuario.idUsuario != null}
            ? @{/usuarios/editar/{id}(id=${usuario.idUsuario})}
            : @{/usuarios/nuevo}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control"
                               th:field="*{nombre}"
                               required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control"
                               th:field="*{email}"
                               required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Contraseña
                            <small class="text-muted fw-normal"
                                   th:if="${usuario.idUsuario != null}">
                                (dejar vacío para no cambiar)
                            </small>
                        </label>
                        <input type="password" class="form-control"
                               name="passwordRaw"
                               th:required="${usuario.idUsuario == null}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Rol</label>
                        <select class="form-select" th:field="*{rol}" required>
                            <option value="">-- Seleccionar --</option>
                            <option th:each="r : ${roles}"
                                    th:value="${r.idRol}"
                                    th:text="${r.nombreRol}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6" th:if="${usuario.idUsuario != null}">
                        <label class="form-label fw-semibold">Estado</label>
                        <select class="form-select" th:field="*{activo}">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a th:href="@{/usuarios}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
