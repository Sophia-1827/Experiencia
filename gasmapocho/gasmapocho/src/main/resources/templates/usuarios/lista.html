<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Gestión de Usuarios</title></head>
<body>
<section class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Gestión de Usuarios</h4>
            <p class="text-muted mb-0">Administra los accesos al sistema</p>
        </div>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">
            + Nuevo Usuario
        </a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="card">
        <div class="card-body p-3">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                            <span class="badge bg-primary"
                                  th:text="${u.rol.nombreRol}"></span>
                    </td>
                    <td class="text-center">
                            <span th:if="${u.activo}"
                                  class="badge bg-success">Activo</span>
                        <span th:unless="${u.activo}"
                              class="badge bg-secondary">Inactivo</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}"
                           class="btn btn-sm btn-outline-primary me-1">
                            Editar
                        </a>
                        <form th:action="@{/usuarios/desactivar/{id}(id=${u.idUsuario})}"
                              method="post" style="display:inline"
                              th:if="${u.activo}">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('¿Desactivar usuario?')">
                                Desactivar
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
