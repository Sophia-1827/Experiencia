<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Proveedores</title></head>
<body>
<section class="p-4">
    <div class="mb-4">
        <h4 class="fw-bold mb-1">Ingreso desde Proveedor</h4>
        <p class="text-muted mb-0">Registra la entrada de cilindros llenos</p>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="row g-4">
        <!-- Formulario -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h6 class="fw-semibold mb-3">Registrar Entrada</h6>
                    <form th:action="@{/movimientos/proveedores/registrar}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Proveedor</label>
                            <select name="idProveedor" class="form-select" required>
                                <option value="">-- Seleccionar --</option>
                                <option th:each="p : ${proveedores}"
                                        th:value="${p.idProveedor}"
                                        th:text="${p.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tipo de Cilindro</label>
                            <select name="idCilindro" class="form-select" required>
                                <option value="">-- Seleccionar --</option>
                                <option th:each="c : ${cilindros}"
                                        th:value="${c.idCilindro}"
                                        th:text="${c.tipo.name().replace('KG_','') + ' kg - ' + c.estado}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cantidad</label>
                            <input type="number" name="cantidad"
                                   class="form-control" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kg por unidad</label>
                            <input type="number" name="kgPorUnidad"
                                   class="form-control" step="0.1" min="0.1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Observacion</label>
                            <input type="text" name="observacion" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Registrar Entrada
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-3">
                    <table class="table table-hover mb-0 table-sm">
                        <thead class="table-light">
                        <tr>
                            <th>Fecha</th>
                            <th>Proveedor</th>
                            <th>Cilindro</th>
                            <th class="text-center">Cantidad</th>
                            <th class="text-center">Kg/u</th>
                            <th>Usuario</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m : ${movimientos}"
                            th:if="${m.tipo.name() == 'ENTRADA'}">
                            <td th:text="${#temporals.format(m.fechaHora,'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${m.proveedor != null ? m.proveedor.nombre : '-'}"></td>
                            <td th:text="${m.cilindro.tipo.name().replace('KG_','') + ' kg'}"></td>
                            <td class="text-center" th:text="${m.cantidad}"></td>
                            <td class="text-center" th:text="${m.kgPorUnidad}"></td>
                            <td th:text="${m.usuario.nombre}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
