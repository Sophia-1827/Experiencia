<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Gas Mapocho</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}">
    <style>
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        .login-screen {
            display: flex;
            min-height: 100vh;
        }

        /* --- Columna izquierda: formulario --- */
        .login-pane {
            flex: 1 1 55%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface);
            padding: 2.5rem;
        }

        .login-form-wrap {
            width: 100%;
            max-width: 420px;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 2.5rem;
        }
        .login-brand img {
            height: 38px;
            width: auto;
        }
        .login-brand span {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }

        .login-form-wrap h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.35rem;
        }
        .login-form-wrap .subtitle {
            color: var(--text-muted);
            font-size: 0.92rem;
            margin-bottom: 2rem;
        }

        .login-form-wrap .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
        }
        .login-form-wrap .form-control {
            padding: 0.65rem 0.85rem;
            font-size: 0.95rem;
        }

        .login-form-wrap .btn-primary {
            background-color: var(--navy);
            border-color: var(--navy);
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .login-form-wrap .btn-primary:hover {
            background-color: var(--navy-hover);
            border-color: var(--navy-hover);
        }

        /* --- Columna derecha: imagen --- */
        .login-visual {
            flex: 1 1 45%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .login-visual img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-visual::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(26,60,94,0.05) 0%, rgba(26,60,94,0.55) 100%);
        }
        .login-visual .login-visual-caption {
            position: relative;
            z-index: 1;
            color: #fff;
            padding: 2.5rem;
        }
        .login-visual .login-visual-caption h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-visual .login-visual-caption p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin: 0;
            max-width: 380px;
        }

        @media (max-width: 860px) {
            .login-visual { display: none; }
            .login-pane { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="login-screen">

    <div class="login-pane">
        <div class="login-form-wrap">

            <div class="login-brand">
                <img th:src="@{/img/gasco.png}" alt="Gasco">

            </div>

            <h1>Inicia sesión</h1>
            <p class="subtitle">Sistema de gestión de inventario de cilindros</p>

            <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
                Email o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email"
                           id="username"
                           name="username"
                           class="form-control"
                           placeholder="correo@mapocho.com"
                           required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="••••••••"
                           required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Ingresar
                </button>
            </form>

        </div>
    </div>

    <div class="login-visual">
        <img th:src="@{/img/login.png}" alt="Gasco - distribución de gas licuado">
        <div class="login-visual-caption">
            <h2>Gas Mapocho</h2>
            <p>Control y trazabilidad de inventario, ventas y proveedores en un solo lugar.</p>
        </div>
    </div>

</div>

</body>
</html>
