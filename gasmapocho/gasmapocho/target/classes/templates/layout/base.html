<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Gas Mapocho</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}">

</head>
<body>

<nav id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo-box">
            <img th:src="@{/img/gasco.png}" alt="Gasco" class="brand-logo">
        </div>
    </div>
    <div class="mt-2">

        <p class="nav-section">Principal</p>
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a th:href="@{/cilindros}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN','ASISTENTE','AUDITOR')"><i class="bi bi-fire"></i>
            Cilindros
        </a>

        <a th:href="@{/movimientos/ventas}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN','ASISTENTE')"><i class="bi bi-cart-fill"></i>
            Ventas / Salidas
        </a>

        <a th:href="@{/movimientos/proveedores}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN')"><i class="bi bi-truck"></i>
            Proveedores
        </a>

        <a th:href="@{/reportes}" class="nav-link"
           sec:authorize="isAuthenticated()"><i class="bi bi-file-earmark-pdf-fill"></i>
            Reportes PDF
        </a>

        <a th:href="@{/usuarios}" class="nav-link"
           sec:authorize="hasRole('ADMINISTRADOR')"><i class="bi bi-people-fill"></i>
            Gestión de usuarios
        </a>

    </div>
</nav>

<div id="main-content">
    <div id="topbar" class="d-flex justify-content-between align-items-center">
        <span class="fw-semibold text-secondary" th:replace="${title}">Pagina</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted small" sec:authentication="name">usuario</span>
            <form th:action="@{/logout}" method="post" class="m-0 d-inline">
                 <button type="submit" class="btn btn-sm btn-outline-danger">Salir</button>
            </form>
        </div>
    </div>
    <div class="page-content" th:replace="${content}">
        Contenido aqui
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Resalta el item del menu segun la ruta actual.
    (function () {
        var path = window.location.pathname;
        var links = document.querySelectorAll('#sidebar .nav-link');
        var best = null, bestLen = -1;
        links.forEach(function (a) {
            var href = a.getAttribute('href');
            if (href && href !== '/' && path.indexOf(href) === 0 && href.length > bestLen) {
                best = a;
                bestLen = href.length;
            }
        });
        if (best) best.classList.add('active');
    })();
</script>
</body>
</html>
