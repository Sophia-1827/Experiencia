<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Gas Mapocho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}">

</head>
<body>

<nav id="sidebar">
    <div class="sidebar-brand">
        Gas Mapocho
    </div>
    <div class="mt-2">

        <p class="nav-section">Principal</p>
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a th:href="@{/cilindros}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN','ASISTENTE','AUDITOR')"><i class="bi bi-fire"></i>
            Cilindros
        </a>

        <a th:href="@{/movimientos/ventas}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN','ASISTENTE')"><i class="bi bi-cart-fill"></i>
            Ventas / Salidas
        </a>

        <a th:href="@{/movimientos/proveedores}" class="nav-link"
           sec:authorize="hasAnyRole('ADMINISTRADOR','JEFE_ALMACEN')"><i class="bi bi-truck"></i>
            Proveedores
        </a>

        <a th:href="@{/reportes}" class="nav-link"
           sec:authorize="isAuthenticated()"><i class="bi bi-file-earmark-pdf-fill"></i>
            Reportes PDF
        </a>

        <a th:href="@{/usuarios}" class="nav-link"
           sec:authorize="hasRole('ADMINISTRADOR')"><i class="bi bi-people-fill"></i>
            Gestion de Usuarios
        </a>

    </div>
</nav>

<div id="main-content">
    <div id="topbar" class="d-flex justify-content-between align-items-center">
        <span class="fw-semibold text-secondary" th:replace="${title}">Pagina</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted small" sec:authentication="name">usuario</span>
            <a th:href="@{/logout}" class="btn btn-sm btn-outline-danger">Salir</a>
        </div>
    </div>
    <div class="page-content" th:replace="${content}">
        Contenido aqui
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
